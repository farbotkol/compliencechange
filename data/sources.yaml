# Data sources configuration
# This file can be used to configure external data sources for collectors

sources:
  australia:
    - url: "https://www.fairwork.gov.au/newsroom/news"
      name: "Fair Work Ombudsman"
      type: "employment_law"
    - url: "https://www.ato.gov.au/About-ATO/New-legislation/"
      name: "Australian Taxation Office"
      type: "tax"
  
  european_union:
    - url: "https://ec.europa.eu/social/main.jsp?catId=157&langId=en"
